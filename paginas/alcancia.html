<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuestra Alcancía — TE AMO</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    /* ── TOKENS ── */
    :root {
      --negro: #08090b;
      --negro-2: #0f1114;
      --negro-3: #161a1f;
      --dorado: #c9a34a;
      --dorado-lt: #e8c87a;
      --dorado-dm: rgba(201,163,74,.18);
      --azul: #4a7fa5;
      --azul-lt: #7eb3d4;
      --verde: #4a8c6a;
      --verde-lt: #7ec4a0;
      --crema: #f0e8d8;
      --crema-dm: #c8bfad;
      --muted: #6b6458;
      --border: rgba(201,163,74,.13);
      --danger: #c0392b;
      --danger-lt: rgba(192,57,43,.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; overflow-x: hidden; }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--negro);
      color: var(--crema);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── CANVAS ── */
    #canvas-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    /* ── LAYOUT ── */
    .page-wrap {
      position: relative; z-index: 1;
      max-width: 780px; margin: 0 auto;
      padding: 2.5rem 1.5rem 5rem;
    }

    /* ── NAV BACK ── */
    .nav-back {
      display: inline-flex; align-items: center; gap: .5rem;
      text-decoration: none; color: var(--muted);
      font-size: .8rem; letter-spacing: .1em; text-transform: uppercase;
      margin-bottom: 2.5rem;
      transition: color .3s;
    }
    .nav-back:hover { color: var(--dorado-lt); }
    .nav-back svg { transition: transform .3s; }
    .nav-back:hover svg { transform: translateX(-3px); }

    /* ── HEADER ── */
    .page-header {
      text-align: center; margin-bottom: 2.5rem;
      animation: fadeInDown .9s cubic-bezier(.16,1,.3,1) both;
    }
    .page-eyebrow {
      font-size: .75rem; letter-spacing: .18em; text-transform: uppercase;
      color: var(--dorado); margin-bottom: .5rem; display: block;
    }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      font-weight: 400; color: var(--crema);
      line-height: 1.15;
    }
    .page-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 1.05rem;
      color: var(--crema-dm); margin-top: .6rem;
    }

    /* ── CARD BASE ── */
    .card {
      background: rgba(15,17,20,.7);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 12px 40px rgba(0,0,0,.25);
    }

    /* ── HERO / META CARD ── */
    .meta-card {
      margin-bottom: 1.5rem;
      animation: fadeInUp .9s cubic-bezier(.16,1,.3,1) .1s both;
    }

    .meta-top {
      display: flex; gap: 1.5rem; align-items: flex-start;
      flex-wrap: wrap;
    }

    /* FOTO */
    .photo-wrap {
      flex-shrink: 0; position: relative;
      width: 110px; height: 110px;
    }
    .photo-circle {
      width: 110px; height: 110px; border-radius: 50%;
      object-fit: cover; border: 2px solid var(--dorado);
      background: var(--negro-3);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; cursor: pointer;
      transition: border-color .3s, box-shadow .3s;
    }
    .photo-circle:hover { border-color: var(--dorado-lt); box-shadow: 0 0 18px rgba(201,163,74,.2); }
    .photo-circle img { width: 100%; height: 100%; object-fit: cover; }
    .photo-placeholder {
      display: flex; flex-direction: column; align-items: center;
      gap: .3rem; color: var(--muted); font-size: .7rem;
      letter-spacing: .08em; text-transform: uppercase;
      text-align: center; padding: .5rem;
      user-select: none;
    }
    .photo-placeholder svg { opacity: .5; }
    #photo-input { display: none; }
    .photo-edit-btn {
      position: absolute; bottom: 2px; right: 2px;
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--dorado); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
      transition: background .3s, transform .2s;
    }
    .photo-edit-btn:hover { background: var(--dorado-lt); transform: scale(1.1); }

    /* DATOS META */
    .meta-info { flex: 1; min-width: 200px; }

    .meta-name-row {
      display: flex; align-items: center; gap: .5rem; margin-bottom: .4rem;
    }
    .meta-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem; font-weight: 600; color: var(--crema);
      cursor: pointer; border-bottom: 1px dashed transparent;
      transition: border-color .3s, color .3s;
      word-break: break-word;
    }
    .meta-name:hover { color: var(--dorado-lt); border-color: var(--dorado-dm); }
    .edit-icon-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: .1rem;
      transition: color .3s, transform .2s;
      flex-shrink: 0;
    }
    .edit-icon-btn:hover { color: var(--dorado-lt); transform: scale(1.15); }

    .meta-goal-row {
      display: flex; align-items: center; gap: .4rem;
      color: var(--muted); font-size: .85rem; margin-bottom: 1rem;
    }
    .meta-goal-row strong { color: var(--dorado-lt); font-size: 1rem; }

    /* PROGRESS BAR */
    .progress-container { margin-bottom: 1rem; }
    .progress-labels {
      display: flex; justify-content: space-between;
      font-size: .78rem; color: var(--muted); margin-bottom: .4rem;
    }
    .progress-labels span:last-child { color: var(--dorado-lt); font-weight: 600; }
    .progress-track {
      height: 10px; background: rgba(201,163,74,.08);
      border-radius: 99px; overflow: hidden;
      border: 1px solid rgba(201,163,74,.12);
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--dorado), var(--dorado-lt));
      border-radius: 99px;
      transition: width .7s cubic-bezier(.16,1,.3,1);
      position: relative; overflow: hidden;
    }
    .progress-fill::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.18) 50%, transparent 100%);
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer {
      from { transform: translateX(-100%); }
      to { transform: translateX(200%); }
    }
    .progress-pct {
      text-align: right; font-size: .78rem; color: var(--dorado-lt);
      font-weight: 600; margin-top: .3rem;
    }

    /* STATS */
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: .8rem; margin-top: 1.2rem;
    }
    .stat-box {
      background: var(--negro-3);
      border: 1px solid var(--border);
      border-radius: 12px; padding: .8rem .6rem;
      text-align: center;
    }
    .stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem; font-weight: 600;
      color: var(--dorado-lt); display: block;
    }
    .stat-label {
      font-size: .68rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em;
    }

    /* CELEBRACIÓN */
    .celebration {
      margin-top: 1.2rem; padding: 1rem 1.2rem;
      background: rgba(74,140,106,.12);
      border: 1px solid rgba(74,140,106,.3);
      border-radius: 12px; text-align: center;
      color: var(--verde-lt); font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 1.05rem;
      display: none;
    }
    .celebration.show { display: block; animation: fadeInUp .5s both; }

    /* ── ABONO CARD ── */
    .abono-card {
      margin-bottom: 1.5rem;
      animation: fadeInUp .9s cubic-bezier(.16,1,.3,1) .2s both;
    }
    .section-label {
      font-size: .72rem; text-transform: uppercase;
      letter-spacing: .15em; color: var(--dorado);
      margin-bottom: 1rem; display: flex; align-items: center; gap: .5rem;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(201,163,74,.2), transparent);
    }

    .abono-form {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: .8rem; align-items: end;
    }
    .form-group { display: flex; flex-direction: column; gap: .4rem; }
    .form-group label {
      font-size: .72rem; text-transform: uppercase;
      letter-spacing: .1em; color: var(--muted);
    }
    .form-input {
      background: var(--negro-3);
      border: 1px solid rgba(201,163,74,.15);
      border-radius: 10px; padding: .65rem .9rem;
      color: var(--crema); font-family: 'Jost', sans-serif;
      font-size: .9rem; outline: none;
      transition: border-color .3s, box-shadow .3s;
      width: 100%;
    }
    .form-input:focus {
      border-color: rgba(201,163,74,.45);
      box-shadow: 0 0 0 3px rgba(201,163,74,.08);
    }
    .form-input::placeholder { color: var(--muted); }
    input[type="number"].form-input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .btn {
      display: inline-flex; align-items: center; gap: .45rem;
      border: none; cursor: pointer; border-radius: 10px;
      font-family: 'Jost', sans-serif; font-weight: 600;
      font-size: .8rem; letter-spacing: .08em; text-transform: uppercase;
      transition: all .3s; padding: .65rem 1.2rem;
      white-space: nowrap;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--dorado), var(--dorado-lt));
      color: var(--negro);
      box-shadow: 0 4px 15px rgba(201,163,74,.2);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(201,163,74,.35);
    }
    .btn-ghost {
      background: rgba(201,163,74,.08);
      border: 1px solid rgba(201,163,74,.2);
      color: var(--dorado-lt);
    }
    .btn-ghost:hover { background: rgba(201,163,74,.14); }
    .btn-danger {
      background: var(--danger-lt);
      border: 1px solid rgba(192,57,43,.25);
      color: #e57373; padding: .35rem .55rem; border-radius: 8px;
    }
    .btn-danger:hover { background: rgba(192,57,43,.25); }

    /* ── HISTORIAL ── */
    .historial-card {
      animation: fadeInUp .9s cubic-bezier(.16,1,.3,1) .3s both;
    }
    .historial-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 1rem;
    }

    .historial-empty {
      text-align: center; padding: 2.5rem 1rem;
      color: var(--muted);
    }
    .historial-empty svg { opacity: .3; margin-bottom: .8rem; }
    .historial-empty p { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.05rem; }

    .historial-list { display: flex; flex-direction: column; gap: .6rem; }

    .abono-item {
      display: flex; align-items: center; gap: .8rem;
      background: var(--negro-3);
      border: 1px solid var(--border);
      border-radius: 12px; padding: .8rem 1rem;
      transition: border-color .3s;
      animation: fadeInLeft .35s both;
    }
    .abono-item:hover { border-color: rgba(201,163,74,.25); }
    .abono-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--dorado); flex-shrink: 0;
    }
    .abono-info { flex: 1; min-width: 0; }
    .abono-desc {
      font-size: .88rem; color: var(--crema); font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .abono-date { font-size: .72rem; color: var(--muted); }
    .abono-amount {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem; font-weight: 600;
      color: var(--dorado-lt); flex-shrink: 0;
    }

    /* ── MODAL DE EDICIÓN ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(8,9,11,.75);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
      opacity: 0; pointer-events: none;
      transition: opacity .3s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--negro-2);
      border: 1px solid rgba(201,163,74,.2);
      border-radius: 20px; padding: 2rem;
      width: 100%; max-width: 440px;
      box-shadow: 0 30px 80px rgba(0,0,0,.5);
      transform: translateY(20px); transition: transform .3s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; color: var(--crema);
      margin-bottom: 1.2rem;
    }
    .modal-actions {
      display: flex; gap: .8rem; justify-content: flex-end; margin-top: 1.4rem;
    }
    .btn-cancel {
      background: none; border: 1px solid rgba(255,255,255,.1);
      color: var(--muted); border-radius: 10px;
      padding: .6rem 1.2rem; cursor: pointer;
      font-family: 'Jost', sans-serif; font-size: .8rem;
      transition: border-color .3s, color .3s;
    }
    .btn-cancel:hover { border-color: rgba(255,255,255,.25); color: var(--crema-dm); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 1.8rem; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--negro-2);
      border: 1px solid rgba(201,163,74,.25);
      border-radius: 12px; padding: .7rem 1.4rem;
      font-size: .85rem; color: var(--crema);
      box-shadow: 0 8px 30px rgba(0,0,0,.4);
      z-index: 200; transition: transform .4s cubic-bezier(.16,1,.3,1), opacity .4s;
      opacity: 0; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── ANIMATIONS ── */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-12px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 560px) {
      .abono-form { grid-template-columns: 1fr; }
      .meta-top { flex-direction: column; align-items: center; text-align: center; }
      .meta-name-row { justify-content: center; }
      .meta-goal-row { justify-content: center; }
      .stats-row { grid-template-columns: repeat(3,1fr); gap: .5rem; }
    }
  </style>
</head>

<body>
  <canvas id="canvas-bg"></canvas>

  <div class="page-wrap">

    <!-- NAV BACK -->
    <a href="../index.html" class="nav-back">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M11 7H3M3 7L6.5 3.5M3 7L6.5 10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Volver
    </a>

    <!-- HEADER -->
    <header class="page-header">
      <span class="page-eyebrow">✦ Nuestro sueño ✦</span>
      <h1 class="page-title" id="page-title-display">Nuestra Alcancía</h1>
      <p class="page-subtitle">Cada peso que guardamos, nos acerca a algo hermoso juntos.</p>
    </header>

    <!-- TARJETA META -->
    <div class="card meta-card">

      <div class="meta-top">

        <!-- FOTO -->
        <div class="photo-wrap">
          <div class="photo-circle" id="photo-circle" onclick="document.getElementById('photo-input').click()" title="Cambiar foto">
            <div class="photo-placeholder" id="photo-placeholder">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="4"/>
                <circle cx="12" cy="11" r="3"/>
                <path d="M3 18c2-3 4-4.5 9-4.5s7 1.5 9 4.5"/>
              </svg>
              Foto
            </div>
            <img id="photo-img" src="" alt="Meta" style="display:none;">
          </div>
          <button class="photo-edit-btn" onclick="document.getElementById('photo-input').click()" title="Cambiar foto">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--negro)" stroke-width="2.5">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
          <input type="file" id="photo-input" accept="image/*">
        </div>

        <!-- INFO -->
        <div class="meta-info">
          <div class="meta-name-row">
            <span class="meta-name" id="meta-name-display" onclick="openModal('name')">Mi Sueño</span>
            <button class="edit-icon-btn" onclick="openModal('name')" title="Editar nombre">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
          </div>
          <div class="meta-goal-row">
            <span>Meta:</span>
            <strong id="meta-goal-display">$0</strong>
            <button class="edit-icon-btn" onclick="openModal('goal')" title="Editar meta">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
          </div>

          <!-- BARRA DE PROGRESO -->
          <div class="progress-container">
            <div class="progress-labels">
              <span id="saved-display">$0 ahorrado</span>
              <span id="remaining-display">Faltan $0</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            </div>
            <div class="progress-pct" id="progress-pct">0%</div>
          </div>
        </div>
      </div>

      <!-- STATS -->
      <div class="stats-row">
        <div class="stat-box">
          <span class="stat-value" id="stat-total">$0</span>
          <span class="stat-label">Ahorrado</span>
        </div>
        <div class="stat-box">
          <span class="stat-value" id="stat-abonos">0</span>
          <span class="stat-label">Abonos</span>
        </div>
        <div class="stat-box">
          <span class="stat-value" id="stat-promedio">$0</span>
          <span class="stat-label">Promedio</span>
        </div>
      </div>

      <!-- CELEBRACIÓN -->
      <div class="celebration" id="celebration">
        🎉 ¡Felicidades! ¡Alcanzaron su meta! Merece una celebración 💛
      </div>
    </div>

    <!-- NUEVO ABONO -->
    <div class="card abono-card">
      <div class="section-label">Agregar abono</div>
      <div class="abono-form">
        <div class="form-group">
          <label for="abono-monto">Monto ($)</label>
          <input type="number" id="abono-monto" class="form-input" placeholder="Ej: 50000" min="1">
        </div>
        <div class="form-group">
          <label for="abono-desc">Descripción</label>
          <input type="text" id="abono-desc" class="form-input" placeholder="Ej: Quincena de julio" maxlength="60">
        </div>
        <button class="btn btn-primary" onclick="agregarAbono()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Abonar
        </button>
      </div>
    </div>

    <!-- HISTORIAL -->
    <div class="card historial-card">
      <div class="historial-header">
        <div class="section-label" style="margin-bottom:0; flex:1;">Historial de abonos</div>
        <button class="btn btn-ghost" onclick="openModal('reset')" style="font-size:.72rem; padding:.4rem .9rem;">
          Reiniciar todo
        </button>
      </div>
      <div id="historial-list"></div>
    </div>

  </div><!-- /page-wrap -->

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
    <div class="modal" id="modal">
      <p class="modal-title" id="modal-title">Editar</p>
      <div id="modal-body"></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" id="modal-save-btn" onclick="saveModal()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    /* ══════════════════════════════
       ESTADO & PERSISTENCIA
    ══════════════════════════════ */
    const KEY = 'alcancia_v1';

    function loadData() {
      try {
        return JSON.parse(localStorage.getItem(KEY)) || defaultData();
      } catch { return defaultData(); }
    }

    function defaultData() {
      return { name: 'Mi Sueño', goal: 500000, saved: 0, photo: null, abonos: [] };
    }

    function saveData(d) {
      localStorage.setItem(KEY, JSON.stringify(d));
    }

    let data = loadData();

    /* ══════════════════════════════
       FORMATEO
    ══════════════════════════════ */
    function fmt(n) {
      return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(n);
    }
    function fmtShort(n) {
      if (n >= 1000000) return '$' + (n / 1000000).toFixed(1).replace('.0','') + 'M';
      if (n >= 1000) return '$' + (n / 1000).toFixed(0) + 'K';
      return fmt(n);
    }

    /* ══════════════════════════════
       RENDER UI
    ══════════════════════════════ */
    function renderAll() {
      // Nombre
      document.getElementById('meta-name-display').textContent = data.name;
      document.getElementById('page-title-display').textContent = data.name;

      // Meta
      document.getElementById('meta-goal-display').textContent = fmt(data.goal);

      // Foto
      const img = document.getElementById('photo-img');
      const placeholder = document.getElementById('photo-placeholder');
      if (data.photo) {
        img.src = data.photo;
        img.style.display = 'block';
        placeholder.style.display = 'none';
      } else {
        img.style.display = 'none';
        placeholder.style.display = 'flex';
      }

      // Calcular
      const saved = data.abonos.reduce((s, a) => s + a.monto, 0);
      const pct = data.goal > 0 ? Math.min(100, (saved / data.goal) * 100) : 0;
      const remaining = Math.max(0, data.goal - saved);

      // Barra
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-pct').textContent = pct.toFixed(1) + '%';
      document.getElementById('saved-display').textContent = fmt(saved) + ' ahorrado';
      document.getElementById('remaining-display').textContent = pct >= 100 ? '¡Meta lograda! 🎉' : 'Faltan ' + fmt(remaining);

      // Stats
      document.getElementById('stat-total').textContent = fmtShort(saved);
      document.getElementById('stat-abonos').textContent = data.abonos.length;
      const promedio = data.abonos.length > 0 ? saved / data.abonos.length : 0;
      document.getElementById('stat-promedio').textContent = fmtShort(promedio);

      // Celebración
      const cel = document.getElementById('celebration');
      cel.classList.toggle('show', pct >= 100);

      // Historial
      renderHistorial();
    }

    function renderHistorial() {
      const container = document.getElementById('historial-list');
      if (data.abonos.length === 0) {
        container.innerHTML = `
          <div class="historial-empty">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" style="display:block;margin:0 auto 0.8rem;">
              <rect x="2" y="5" width="20" height="14" rx="3"/>
              <line x1="2" y1="10" x2="22" y2="10"/>
            </svg>
            <p>Aún no hay abonos — ¡el primer paso es el más especial!</p>
          </div>`;
        return;
      }

      const sorted = [...data.abonos].reverse();
      container.innerHTML = '<div class="historial-list">' +
        sorted.map((a, i) => `
          <div class="abono-item" style="animation-delay:${i * 0.04}s">
            <div class="abono-dot"></div>
            <div class="abono-info">
              <div class="abono-desc">${escHtml(a.desc || 'Abono')}</div>
              <div class="abono-date">${a.fecha}</div>
            </div>
            <span class="abono-amount">${fmt(a.monto)}</span>
            <button class="btn btn-danger" onclick="eliminarAbono('${a.id}')" title="Eliminar">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
              </svg>
            </button>
          </div>`).join('') + '</div>';
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ══════════════════════════════
       ACCIONES
    ══════════════════════════════ */
    function agregarAbono() {
      const montoEl = document.getElementById('abono-monto');
      const descEl  = document.getElementById('abono-desc');
      const monto = parseFloat(montoEl.value);
      if (!monto || monto <= 0) { showToast('Ingresa un monto válido ✕', 'error'); return; }
      const desc = descEl.value.trim() || 'Abono';
      const fecha = new Date().toLocaleDateString('es-CO', { day:'2-digit', month:'short', year:'numeric' });
      data.abonos.push({ id: Date.now().toString(), monto, desc, fecha });
      saveData(data);
      renderAll();
      montoEl.value = '';
      descEl.value = '';
      showToast('✓ Abono de ' + fmt(monto) + ' registrado');
    }

    function eliminarAbono(id) {
      data.abonos = data.abonos.filter(a => a.id !== id);
      saveData(data);
      renderAll();
      showToast('Abono eliminado', 'info');
    }

    /* ══════════════════════════════
       FOTO
    ══════════════════════════════ */
    document.getElementById('photo-input').addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        data.photo = e.target.result;
        saveData(data);
        renderAll();
        showToast('✓ Foto actualizada');
      };
      reader.readAsDataURL(file);
    });

    /* ══════════════════════════════
       TECLADO: ENTER en FORM
    ══════════════════════════════ */
    document.getElementById('abono-monto').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('abono-desc').focus(); });
    document.getElementById('abono-desc').addEventListener('keydown', e => { if(e.key==='Enter') agregarAbono(); });

    /* ══════════════════════════════
       MODAL
    ══════════════════════════════ */
    let currentModal = null;

    function openModal(type) {
      currentModal = type;
      const overlay = document.getElementById('modal-overlay');
      const title   = document.getElementById('modal-title');
      const body    = document.getElementById('modal-body');
      const saveBtn = document.getElementById('modal-save-btn');

      if (type === 'name') {
        title.textContent = 'Editar nombre de la meta';
        body.innerHTML = `
          <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="modal-input" class="form-input" value="${escHtml(data.name)}" maxlength="50" placeholder="Nombre del sueño">
          </div>`;
        saveBtn.style.display = 'inline-flex';
        setTimeout(() => document.getElementById('modal-input')?.focus(), 100);
      } else if (type === 'goal') {
        title.textContent = 'Editar meta de ahorro';
        body.innerHTML = `
          <div class="form-group">
            <label>Monto meta ($)</label>
            <input type="number" id="modal-input" class="form-input" value="${data.goal}" min="1" placeholder="Ej: 1000000">
          </div>`;
        saveBtn.style.display = 'inline-flex';
        setTimeout(() => document.getElementById('modal-input')?.focus(), 100);
      } else if (type === 'reset') {
        title.textContent = '¿Reiniciar alcancía?';
        body.innerHTML = `<p style="color:var(--crema-dm);font-size:.9rem;line-height:1.6;">Se eliminarán todos los abonos y se reiniciará el progreso. <br><strong style="color:#e57373;">Esta acción no se puede deshacer.</strong></p>`;
        saveBtn.textContent = 'Sí, reiniciar';
        saveBtn.style.display = 'inline-flex';
      }

      overlay.classList.add('open');

      // Enter en modal inputs
      setTimeout(() => {
        document.getElementById('modal-input')?.addEventListener('keydown', e => { if(e.key==='Enter') saveModal(); });
      }, 150);
    }

    function saveModal() {
      if (currentModal === 'name') {
        const val = document.getElementById('modal-input')?.value.trim();
        if (!val) { showToast('El nombre no puede estar vacío', 'error'); return; }
        data.name = val;
        saveData(data);
        renderAll();
        showToast('✓ Nombre actualizado');
      } else if (currentModal === 'goal') {
        const val = parseFloat(document.getElementById('modal-input')?.value);
        if (!val || val <= 0) { showToast('Ingresa una meta válida', 'error'); return; }
        data.goal = val;
        saveData(data);
        renderAll();
        showToast('✓ Meta actualizada');
      } else if (currentModal === 'reset') {
        data.abonos = [];
        saveData(data);
        renderAll();
        showToast('Alcancía reiniciada', 'info');
        document.getElementById('modal-save-btn').textContent = 'Guardar';
      }
      closeModal();
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      currentModal = null;
    }

    function closeModalOutside(e) {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    }

    /* ══════════════════════════════
       TOAST
    ══════════════════════════════ */
    let toastTimer;
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.borderColor = type === 'error' ? 'rgba(192,57,43,.4)' : type === 'info' ? 'rgba(74,127,165,.35)' : 'rgba(201,163,74,.25)';
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
    }

    /* ══════════════════════════════
       CANVAS ESTRELLAS
    ══════════════════════════════ */
    (function () {
      const c = document.getElementById('canvas-bg');
      const ctx = c.getContext('2d');
      let stars = [], W, H;
      function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
      function mkStar() {
        return { x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.2+0.3,
          op: Math.random(), d: Math.random()*0.005+0.002, rising: Math.random()>0.5,
          hue: [null,'#c9a34a','#4a7fa5','#4a8c6a'][Math.floor(Math.random()*4)] };
      }
      function init() { resize(); stars = Array.from({length:120}, mkStar); }
      function draw() {
        ctx.clearRect(0,0,W,H);
        stars.forEach(s => {
          ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
          ctx.fillStyle = s.hue||'#f0e8d8'; ctx.globalAlpha = s.op*0.5; ctx.fill(); ctx.globalAlpha=1;
          if(s.rising){s.op+=s.d;if(s.op>=1)s.rising=false;}else{s.op-=s.d;if(s.op<=0)s.rising=true;}
        });
        requestAnimationFrame(draw);
      }
      window.addEventListener('resize', resize);
      init(); draw();
    })();

    /* ══════════════════════════════
       INIT
    ══════════════════════════════ */
    renderAll();
  </script>
</body>
</html>
