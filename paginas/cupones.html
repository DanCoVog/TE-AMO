<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talonario de Cupones</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --negro: #08090b;
            --dorado: #c9a34a;
            --dorado-lt: #e8c87a;
            --crema: #f0e8d8;
            --muted: #6b6458;
            --border: rgba(201, 163, 74, 0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Jost', sans-serif;
            background: var(--negro);
            color: var(--crema);
            min-height: 100vh;
            padding: 5rem 1.5rem 3rem;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, rgba(201, 163, 74, 0.08), transparent 60%);
        }
        /* Botón Volver */
        .back-btn {
            position: fixed; top: 1.5rem; left: 1.5rem; z-index: 100;
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.6rem 1.2rem; border-radius: 30px;
            background: rgba(15, 17, 20, 0.6); border: 1px solid var(--border);
            color: var(--dorado-lt); text-decoration: none; font-size: 0.8rem;
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
            backdrop-filter: blur(8px); transition: all 0.3s ease;
        }
        .back-btn:hover { background: rgba(201, 163, 74, 0.15); color: var(--crema); }
        
        .header { text-align: center; margin-bottom: 3rem; }
        .header h1 { font-family: 'Cormorant Garamond', serif; font-size: 3rem; color: var(--dorado-lt); font-style: italic; }
        .header p { color: var(--muted); font-size: 1rem; margin-top: 0.5rem; }
        
        .tabs { display: flex; justify-content: center; gap: 1rem; margin-bottom: 3rem; }
        .tab-btn {
            background: transparent; border: 1px solid var(--border);
            color: var(--muted); padding: 0.75rem 2rem; border-radius: 30px;
            font-family: 'Jost', sans-serif; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, var(--dorado-lt), var(--dorado));
            color: var(--negro); border-color: transparent;
        }
        
        .cupones-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem; max-width: 1000px; margin: 0 auto; display: none;
        }
        .cupones-grid.active { display: grid; animation: fadeIn 0.5s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .cupon {
            background: rgba(15, 17, 20, 0.7); border: 1px dashed var(--dorado);
            border-radius: 12px; padding: 2rem; text-align: center;
            position: relative; overflow: hidden; backdrop-filter: blur(10px);
            transition: transform 0.3s;
        }
        .cupon::before, .cupon::after {
            content: ''; position: absolute; top: 50%; width: 20px; height: 20px;
            background: var(--negro); border-radius: 50%; border: 1px dashed var(--dorado);
            transform: translateY(-50%);
        }
        .cupon::before { left: -10px; border-left: none; }
        .cupon::after { right: -10px; border-right: none; }
        
        .cupon:hover:not(.used) { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(201,163,74,0.1); }
        
        .cupon-icon { font-size: 2.5rem; margin-bottom: 1rem; display: block; }
        .cupon-title { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 600; color: var(--crema); margin-bottom: 0.5rem; }
        .cupon-desc { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.5rem; }
        
        .btn-canjear {
            background: transparent; border: 1px solid var(--dorado-lt);
            color: var(--dorado-lt); padding: 0.5rem 1.5rem; border-radius: 20px;
            font-family: 'Jost', sans-serif; font-size: 0.8rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-canjear:hover { background: var(--dorado-lt); color: var(--negro); }
        
        .cupon.used { opacity: 0.5; filter: grayscale(1); pointer-events: none; border-style: solid; }
        .cupon.used .btn-canjear { background: var(--muted); color: var(--negro); border-color: var(--muted); }
        
        /* Animación Confeti */
        .confetti { position: fixed; width: 10px; height: 10px; background-color: var(--dorado-lt); pointer-events: none; z-index: 1000; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    </style>
</head>
<body>

    <a href="../index.html" class="back-btn">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9.5 6H2.5M2.5 6L5.5 3M2.5 6L5.5 9"/></svg> Inicio
    </a>

    <div class="header">
        <h1>Nuestro Talonario</h1>
        <p>Vales especiales que puedes usar cuando quieras.</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('ella')">Para Ti</button>
        <button class="tab-btn" onclick="switchTab('yo')">Para Mí</button>
    </div>

    <div id="grid-ella" class="cupones-grid active"></div>
    <div id="grid-yo" class="cupones-grid"></div>

    <script>
        /* ==============================================================
           PERSONALIZA AQUÍ TUS CUPONES
        ============================================================== */
        const cupones = {
            ella: [
                { id: 'e1', icon: '💆‍♀️', title: 'Masaje Relajante', desc: 'Vale por un masaje de 30 minutos sin interrupciones.' },
                { id: 'e2', icon: '🍽️', title: 'Cena a Elección', desc: 'Tú eliges qué comemos y yo invito.' },
                { id: 'e3', icon: '🍿', title: 'Noche de Películas', desc: 'Tú eliges la película, yo preparo las palomitas.' },
                { id: 'e4', icon: '🥺', title: 'Perdón Incondicional', desc: 'Vale para perdonar una pequeña rabieta o enojo sin hacer preguntas.' },
                { id: 'e5', icon: '🛍️', title: 'Tarde de Compras', desc: 'Te acompaño de compras sin quejarme ni una sola vez.' },
                { id: 'e6', icon: '🍷', title: 'Cita Sorpresa', desc: 'Vale por una cita planeada 100% por mí, tú solo debes arreglarte.' },
                { id: 'e7', icon: '🎧', title: 'DJ por un Día', desc: 'Tienes el control absoluto de la música en el coche todo el día.' },
                { id: 'e8', icon: '📸', title: 'Sesión de Fotos', desc: 'Seré tu fotógrafo personal pacientemente hasta que salga la foto perfecta.' }
            ],
            yo: [
                { id: 'y1', icon: '🎮', title: 'Tarde Libre', desc: 'Vale por unas horas ininterrumpidas de mi pasatiempo favorito.' },
                { id: 'y2', icon: '🍔', title: 'Mi Antojo', desc: 'Yo decido qué cenamos hoy.' },
                { id: 'y3', icon: '😴', title: 'Dormir 5 Minutos Más', desc: 'No me puedes levantar temprano hoy.' },
                { id: 'y4', icon: '🤫', title: 'Pausa Táctica', desc: 'Vale por detener una discusión durante 30 minutos para respirar y calmarnos.' },
                { id: 'y5', icon: '🎟️', title: 'Pase de Salida', desc: 'Vale por cancelar un plan de último momento para quedarnos acostados viendo series.' }
            ]
        };
        /* ============================================================== */

        function renderCupones() {
            ['ella', 'yo'].forEach(tipo => {
                const grid = document.getElementById(`grid-${tipo}`);
                grid.innerHTML = cupones[tipo].map(c => {
                    const isUsed = localStorage.getItem(`cupon_${c.id}`) === 'true';
                    return `
                        <div class="cupon ${isUsed ? 'used' : ''}" id="cupon-${c.id}">
                            <span class="cupon-icon">${c.icon}</span>
                            <h3 class="cupon-title">${c.title}</h3>
                            <p class="cupon-desc">${c.desc}</p>
                            <button class="btn-canjear" onclick="canjear('${c.id}')">
                                ${isUsed ? 'Canjeado' : 'Canjear'}
                            </button>
                        </div>
                    `;
                }).join('');
            });
        }

        function canjear(id) {
            localStorage.setItem(`cupon_${id}`, 'true');
            const cupon = document.getElementById(`cupon-${id}`);
            cupon.classList.add('used');
            cupon.querySelector('.btn-canjear').innerText = 'Canjeado';
            lanzarConfeti();
        }

        function lanzarConfeti() {
            const colors = ['#c9a34a', '#e8c87a', '#ffffff', '#4a7fa5'];
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const conf = document.createElement('div');
                    conf.className = 'confetti';
                    conf.style.left = Math.random() * 100 + 'vw';
                    conf.style.background = colors[Math.floor(Math.random() * colors.length)];
                    conf.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(conf);
                    setTimeout(() => conf.remove(), 4000);
                }, i * 50);
            }
        }

        function switchTab(tipo) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.cupones-grid').forEach(g => g.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`grid-${tipo}`).classList.add('active');
        }

        renderCupones();
    </script>
</body>
</html>
