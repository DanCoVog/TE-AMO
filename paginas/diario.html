<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Diario</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --negro: #08090b;
            --dorado: #c9a34a;
            --dorado-lt: #e8c87a;
            --crema: #f0e8d8;
            --papel: #f9f5ed;
            --tinta: #3a2233;
            --border: rgba(201, 163, 74, 0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Jost', sans-serif;
            background: var(--negro);
            color: var(--crema);
            min-height: 100vh;
            padding: 5rem 1.5rem 3rem;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .back-btn {
            position: fixed; top: 1.5rem; left: 1.5rem; z-index: 100;
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.6rem 1.2rem; border-radius: 30px;
            background: rgba(15, 17, 20, 0.6); border: 1px solid var(--border);
            color: var(--dorado-lt); text-decoration: none; font-size: 0.8rem;
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
            backdrop-filter: blur(8px); transition: all 0.3s ease;
        }
        .back-btn:hover { background: rgba(201, 163, 74, 0.15); color: var(--crema); }
        
        .header { text-align: center; margin-bottom: 2.5rem; }
        .header h1 { font-family: 'Cormorant Garamond', serif; font-size: 3rem; color: var(--dorado-lt); font-style: italic; }
        .header p { color: var(--muted); font-size: 0.95rem; margin-top: 0.5rem; max-width: 500px; margin-inline: auto; color: #a9a295;}
        
        .book {
            background: var(--papel); color: var(--tinta);
            width: 100%; max-width: 800px;
            border-radius: 8px 15px 15px 8px;
            box-shadow: inset 10px 0 20px rgba(0,0,0,0.1), 0 15px 35px rgba(0,0,0,0.4);
            padding: 3rem 2rem; position: relative;
        }
        .book::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 30px;
            background: linear-gradient(to right, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0) 100%);
            border-radius: 8px 0 0 8px; pointer-events: none;
        }

        .entries-list { margin-bottom: 2rem; max-height: 400px; overflow-y: auto; padding-right: 1rem; }
        .entry {
            border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 1rem; margin-bottom: 1.5rem;
            animation: fadeIn 0.4s ease;
        }
        .entry-date { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.9rem; color: #887a6c; margin-bottom: 0.3rem; }
        .entry-text { font-size: 1rem; line-height: 1.6; white-space: pre-wrap; }
        
        .write-zone {
            display: flex; flex-direction: column; gap: 1rem;
            border-top: 2px dashed rgba(0,0,0,0.1); padding-top: 2rem;
        }
        textarea {
            width: 100%; min-height: 120px; background: transparent;
            border: 1px solid rgba(0,0,0,0.15); border-radius: 8px;
            padding: 1rem; font-family: 'Jost', sans-serif; font-size: 1rem;
            color: var(--tinta); resize: vertical; outline: none; transition: border 0.3s;
        }
        textarea:focus { border-color: var(--dorado); }
        
        .btns-row { display: flex; gap: 1rem; flex-wrap: wrap; }
        .btn {
            padding: 0.75rem 1.5rem; border-radius: 8px; font-family: 'Jost', sans-serif;
            font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.3s;
            display: inline-flex; align-items: center; gap: 0.5rem; border: none;
        }
        .btn-save { background: var(--tinta); color: var(--papel); }
        .btn-save:hover { background: #251420; }
        .btn-share { background: #25D366; color: white; text-decoration: none; }
        .btn-share:hover { background: #1ebe57; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 600px) {
            .book { padding: 2rem 1.5rem; }
            .header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <a href="../index.html" class="back-btn">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9.5 6H2.5M2.5 6L5.5 3M2.5 6L5.5 9"/></svg> Inicio
    </a>

    <div class="header">
        <h1>Nuestro Diario</h1>
        <p>Escribe aquí lo que sientes. Tus palabras se guardan en este dispositivo de forma segura. Compártelas conmigo por WhatsApp cuando quieras.</p>
    </div>

    <div class="book">
        <div class="entries-list" id="entries-list">
            <!-- Entradas del diario irán aquí -->
        </div>

        <div class="write-zone">
            <textarea id="entryText" placeholder="Escribe tu recuerdo o mensaje aquí..."></textarea>
            <div class="btns-row">
                <button class="btn btn-save" onclick="guardarEntrada()">Guardar en el Diario</button>
                <a href="#" class="btn btn-share" id="whatsappBtn" target="_blank" onclick="prepararWhatsApp(event)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                    Enviar por WhatsApp
                </a>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'teamo_diario_entradas';
        const listEl = document.getElementById('entries-list');
        const textEl = document.getElementById('entryText');

        function cargarEntradas() {
            const entradas = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            if (entradas.length === 0) {
                listEl.innerHTML = '<p style="color:#a9a295; font-style:italic; text-align:center;">Aún no hay entradas en nuestro diario.</p>';
                return;
            }
            listEl.innerHTML = entradas.map(e => `
                <div class="entry">
                    <div class="entry-date">${e.fecha}</div>
                    <div class="entry-text">${e.texto}</div>
                </div>
            `).join('');
            listEl.scrollTop = listEl.scrollHeight;
        }

        function guardarEntrada() {
            const txt = textEl.value.trim();
            if(!txt) return;

            const entradas = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const fechaStr = new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            
            entradas.push({ fecha: fechaStr, texto: txt });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(entradas));
            
            textEl.value = '';
            cargarEntradas();
        }

        function prepararWhatsApp(e) {
            const txt = textEl.value.trim();
            if(!txt) {
                alert('Escribe algo primero para poder enviarlo.');
                e.preventDefault();
                return;
            }
            
            // Reemplaza TUTELEFONO con tu número real, formato internacional sin el + (ej. 521XXXXXXXXXX)
            // Si lo dejas vacío, le abrirá su lista de contactos en WA para que elija a quién mandarlo.
            const tuNumero = ''; 
            const mensaje = encodeURIComponent(`*Del Diario:* \n\n${txt}`);
            const url = `https://api.whatsapp.com/send?phone=${tuNumero}&text=${mensaje}`;
            document.getElementById('whatsappBtn').href = url;
            
            // También lo guardamos localmente
            guardarEntrada();
        }

        cargarEntradas();
    </script>
</body>
</html>
